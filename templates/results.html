<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Final Results</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #f9f9f9;
      padding: 40px;
      text-align: center;
    }
    h2 {
      margin-bottom: 30px;
    }
    h3 {
      margin-top: 40px;
      color: #333;
    }
    table {
      margin: 0 auto 20px auto;
      border-collapse: collapse;
      width: 60%;
      background-color: #fff;
      box-shadow: 0 0 10px rgba(0,0,0,0.05);
    }
    th, td {
      padding: 12px 16px;
      border: 1px solid #ddd;
    }
    th {
      background-color: #007BFF;
      color: white;
    }
    tr:hover {
      background-color: #f1f1f1;
    }
  </style>
</head>
<body>
  <h2>Final Results</h2>
  {% for exp, players in results.items() %}
    <h3>Experiment {{ exp }}</h3>
    <table>
      <tr>
        <th>Player</th>
        <th>Total Earnings</th>
      </tr>
      {% for name, earnings in players.items() %}
      <tr>
        <td>{{ name }}</td>
        <td>${{ earnings }}</td>
      </tr>
      {% endfor %}
    </table>
  {% endfor %}
</body>
</html>
