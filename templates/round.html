<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Round {{ round_number or 'N/A' }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #f4f4f4;
      text-align: center;
      padding: 40px;
    }
    h2 {
      margin-bottom: 20px;
    }
    p {
      font-size: 18px;
      margin-bottom: 30px;
    }
    form {
      margin-bottom: 40px;
    }
    input[type="number"] {
      padding: 10px;
      width: 200px;
      border: 1px solid #ccc;
      border-radius: 4px;
      margin-right: 10px;
    }
    button {
      padding: 10px 20px;
      background-color: #007BFF;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background-color: #0056b3;
    }
    #chat {
      margin-top: 40px;
      background: white;
      padding: 20px;
      border-radius: 8px;
      width: 60%;
      margin-left: auto;
      margin-right: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    #messages {
      list-style-type: none;
      padding: 0;
      max-height: 200px;
      overflow-y: auto;
      margin-bottom: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
    }
    #messages li {
      padding: 8px;
      border-bottom: 1px solid #eee;
      text-align: left;
    }
    #chat_input {
      padding: 10px;
      width: 70%;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <h2>Round {{ round_number or 'N/A' }}</h2>
  <p>Your valuation: <strong>{{ valuation if valuation is not none else 'Unknown' }}</strong></p>

  <form method="POST">
    <input type="number" name="bid" step="0.01" min="0" max="100" required>
    <button type="submit">Submit Bid</button>
  </form>

  {% if experiment is defined and experiment in [3, 6] %}
  <div id="chat">
    <h3>Chat with your opponent</h3>
    <ul id="messages"></ul>
    <input id="chat_input" autocomplete="off">
    <button onclick="sendMessage()">Send</button>
  </div>

  <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
  <script>
    const socket = io();
    const input = document.getElementById('chat_input');
    const messages = document.getElementById('messages');

    function sendMessage() {
      const msg = input.value.trim();
      if (msg) {
        socket.emit('chat_message', msg);
        input.value = '';
      }
    }

    socket.on('chat_message', function(msg) {
      const li = document.createElement('li');
      li.textContent = msg;
      messages.appendChild(li);
      messages.scrollTop = messages.scrollHeight;
    });
  </script>
  {% endif %}
</body>
</html>
